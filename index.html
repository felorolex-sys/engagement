<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خطوبة أبانوب و مريم ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1b 100%);
            touch-action: manipulation;
        }

        /* العنوان والقلب النابض */
        h1 {
            margin-top: 50px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .main-heart {
            color: #ff4d6d;
            display: inline-block;
            animation: heartbeat 1.2s infinite;
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.3); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* مربعات الوقت */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            margin-top: 10px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-value {
            display: block;
            font-size: 2rem;
            font-weight: bold;
        }

        .time-label {
            font-size: 0.85rem;
            color: #aaa;
        }

        .seconds-box {
            grid-column: span 3;
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        /* الزراير جنب بعض */
        .buttons-container {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 85%;
            max-width: 400px;
        }

        .btn {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-full {
            grid-column: span 2;
            background: rgba(255, 77, 109, 0.2);
            border: 1px solid #ff4d6d;
        }

        .btn:active { transform: scale(0.95); }

        /* شريط الكلام المتحرك */
        .marquee {
            position: fixed;
            bottom: 20px;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.4);
        }

        .marquee span {
            display: inline-block;
            padding-right: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100%, 0); }
        }

        /* الخلفية */
        .star { position: fixed; width: 2px; height: 2px; background: white; border-radius: 50%; z-index: -1; opacity: 0.4; }
        .heart-bg { position: fixed; font-size: 15px; z-index: -1; opacity: 0.5; animation: float 6s linear forwards; }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>
        💍 أبانوب 
        <span class="main-heart">❤️</span> 
        مريم 💍
    </h1>

    <div class="countdown-container">
        <div class="time-box">
            <span class="time-value" id="days">0</span>
            <span class="time-label">أيام</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="hours">0</span>
            <span class="time-label">ساعات</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="minutes">0</span>
            <span class="time-label">دقائق</span>
        </div>
        <div class="time-box seconds-box">
            <span class="time-value" id="seconds" style="color:#ff4d6d;">0</span>
            <span class="time-label">ثواني تمر بحب..</span>
        </div>
    </div>

    <div class="buttons-container">
        <a href="https://maps.app.goo.gl/x3DeTCPaYsNbyYix9" target="_blank" class="btn">🏠 لوكيشن البيت</a>
        <a href="https://maps.app.goo.gl/oUw7QAypMEFNfiny6?g_st=aw" target="_blank" class="btn">⛪ لوكيشن الكنيسة</a>
        <div class="btn btn-full">✨ عقبال كل الحبايب ✨</div>
    </div>

    <div class="marquee">
        <span>✨ مستنينكم تنورونا.. الفرحة مش هتكمل غير بيكم.. عقبال عندكم جميعاً ✨</span>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        // قائمة الأغاني - حط أسامي الملفات اللي عندك هنا
        const playlist = ["song1.mp3", "song2.mp3", "song3.mp3"];
        let currentTrack = 0;
        const audio = document.getElementById("mainAudio");

        function loadTrack(trackIndex) {
            audio.src = playlist[trackIndex];
            audio.load();
        }

        // تشغيل لما المستخدم يلمس الشاشة
        document.body.addEventListener('click', function() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio play failed"));
            }
        }, { once: true });

        // لما الأغنية تخلص، شغل اللي بعدها
        audio.addEventListener('ended', function() {
            currentTrack++;
            if (currentTrack >= playlist.length) {
                currentTrack = 0; // يرجع يعيد من الأول
            }
            loadTrack(currentTrack);
            audio.play();
        });

        // تحميل أول أغنية عند البداية
        loadTrack(currentTrack);

        // --- تأثيرات الخلفية ---
        for(let i=0; i<40; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            document.body.appendChild(star);
        }

        function createHeart() {
            let h = document.createElement("div");
            h.className = "heart-bg";
            h.innerHTML = "❤️";
            h.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }
        setInterval(createHeart, 1000);

        // --- العداد التنازلي ---
        let target = new Date("March 27, 2026 11:00:00").getTime();
        setInterval(() => {
            let now = new Date().getTime();
            let diff = target - now;
            if(diff > 0) {
                document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
